---
- name: "Hardening Ubuntu 22.04 with CIS Benchmark Level {{ ubtu22cis_level }}"
  hosts: "all:!SLKVAWXTFGDES"
  become: true
  
  vars:
    # Safe defaults (will be overwritten by AWX Survey)
    ubtu22cis_level: 1
    ubtu22cis_disruption_high: false
    skip_reboot: true
    
    # Default survey variable (fallback if survey is skipped)
    enable_auditing: false

  pre_tasks:
    - name: Map survey variable to CIS audit variables
      ansible.builtin.set_fact:
        setup_audit: "{{ enable_auditing | default(false) | bool }}"
        run_audit: "{{ enable_auditing | default(false) | bool }}"

  roles:
    - role: roles/UBUNTU22-CIS
