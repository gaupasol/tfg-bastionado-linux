- name: Ejecutar escaneo de seguridad OpenSCAP en Ubuntu 22.04
  hosts: "all:!SLKVAWXTFGDES"  # Apunta a todas las máquinas excepto al host de AWX
  become: yes
  gather_facts: yes
  vars:
    # Define la normativa aquí para que se actualice en todo el playbook automáticamente
    oscap_profile: "xccdf_org.ssgproject.content_profile_cis_level1_server"
    benchmark: "cis_server_l1"
    github_raw_xml_url: "https://raw.githubusercontent.com/gaupasol/tfg-bastionado-linux/main/resources/scans/openSCAP/ssg-ubuntu2204-ds.xml"

  tasks:
    - name: Instalar el escáner OpenSCAP (sin las guías locales)
      ansible.builtin.apt:
        name: libopenscap8
        state: present
        update_cache: yes

    - name: Asegurar que el directorio temporal de reportes exista en el objetivo
      ansible.builtin.file:
        path: /tmp/openscap_reports
        state: directory
        mode: '0755'

    - name: Descargar el datastream desde GitHub al nodo de control (AWX)
      ansible.builtin.get_url:
        url: "{{ github_raw_xml_url }}"
        dest: /tmp/ssg-ubuntu2204-ds.xml
        mode: '0644'
      delegate_to: localhost
      run_once: yes
      become: no

    - name: Copiar el datastream desde AWX al objetivo a través de SSH (Air-gapped)
      ansible.builtin.copy:
        src: /tmp/ssg-ubuntu2204-ds.xml
        dest: /tmp/openscap_reports/ssg-ubuntu2204-ds.xml

    - name: Ejecutar evaluación OpenSCAP con el XML
      ansible.builtin.command: >
        oscap xccdf eval
        --profile {{ oscap_profile }}
        --results /tmp/openscap_reports/results.xml
        --report /tmp/openscap_reports/report.html
        /tmp/openscap_reports/ssg-ubuntu2204-ds.xml
      register: oscap_scan
      failed_when: oscap_scan.rc not in [0, 2]

    - name: Notificar finalización del escaneo
      block:
        - name: 1a. Definir variables base para la nomenclatura
          ansible.builtin.set_fact:
            os_ver: "{{ ansible_distribution | lower | replace(' ', '') | replace('linux', '') }}{{ ansible_distribution_version | replace('.', '') }}"
            target_name: "{{ inventory_hostname }}"

        - name: 1b. Construir el nombre de archivo dinámico final
          ansible.builtin.set_fact:
            file_base: "{{ ansible_date_time.date }}-{{ ansible_date_time.hour }}T{{ ansible_date_time.minute }}-{{ os_ver }}-{{ benchmark }}-{{ target_name }}"

        - name: 2. Obtener reporte XML del objetivo escaneado al contenedor AWX
          ansible.builtin.fetch:
            src: /tmp/openscap_reports/results.xml
            dest: "/tmp/{{ file_base }}.xml"
            flat: yes

        - name: 3. Obtener reporte HTML del objetivo escaneado al contenedor AWX
          ansible.builtin.fetch:
            src: /tmp/openscap_reports/report.html
            dest: "/tmp/{{ file_base }}.html"
            flat: yes

        - name: 4. Asegurar que la estructura de carpetas exista en el Host AWX
          ansible.builtin.file:
            path: "/home/ibai/awx-poc-tfg/reportes/{{ target_name }}/{{ item }}"
            state: directory
            mode: '0755'
          delegate_to: SLKVAWXTFGDES
          become: yes
          loop:
            - xml
            - html

        - name: 5. Mover los reportes del contenedor AWX al Host AWX a sus carpetas respectivas
          ansible.builtin.copy:
            src: "/tmp/{{ file_base }}.{{ item }}"
            dest: "/home/ibai/awx-poc-tfg/reportes/{{ target_name }}/{{ item }}/{{ file_base }}.{{ item }}"
          delegate_to: SLKVAWXTFGDES
          loop:
            - xml
            - html

    # --- INICIO DE EXTRACCIÓN DE PORCENTAJE EN EL HOST ---
    - name: Extraer el porcentaje de cumplimiento desde el archivo guardado en el Host AWX
      ansible.builtin.shell: "awk -F'[><]' '/<score system=\"urn:xccdf:scoring:default\"/{print $3; exit}' /home/ibai/awx-poc-tfg/reportes/{{ target_name }}/xml/{{ file_base }}.xml"
      delegate_to: SLKVAWXTFGDES
      register: openscap_score
      changed_when: false
      become: yes

    - name: Mostrar el porcentaje de cumplimiento final en consola
      ansible.builtin.debug:
        msg: "El porcentaje de cumplimiento ({{ benchmark | replace('_', ' ') | upper }}) para {{ inventory_hostname }} es: {{ openscap_score.stdout | float | round(2) }}%"
    # --- FIN DE EXTRACCIÓN DE PORCENTAJE ---

    - name: Limpiar archivos temporales en el objetivo
      ansible.builtin.file:
        path: /tmp/openscap_reports
        state: absent

    - name: Limpiar el archivo XML descargado en el contenedor AWX local
      ansible.builtin.file:
        path: /tmp/ssg-ubuntu2204-ds.xml
        state: absent
      delegate_to: localhost
      run_once: yes
      become: no
