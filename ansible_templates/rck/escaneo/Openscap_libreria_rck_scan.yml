- name: Ejecutar escaneo de seguridad OpenSCAP (Servidor CIS L1) en Rocky Linux 9
  hosts: "all:!SLKVAWXTFGDES"  # Apunta a todas las máquinas excepto al host de AWX
  become: yes
  gather_facts: yes

  tasks:
    - name: Instalar el escáner OpenSCAP y las guías de seguridad
      ansible.builtin.package:
        name:
          - openscap-scanner
          - scap-security-guide
        state: present

    - name: Asegurar que el directorio temporal de reportes exista en el objetivo
      ansible.builtin.file:
        path: /tmp/openscap_reports
        state: directory
        mode: '0755'

    # --- INICIO DEL PARCHEO DEL DATASTREAM ---
    - name: Crear una copia de trabajo del datastream de RHEL 9
      ansible.builtin.copy:
        src: /usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml
        dest: /tmp/openscap_reports/ssg-rocky9-custom-ds.xml
        remote_src: yes

    - name: Parchear verificación RPM (Cambiar redhat-release por rocky-release)
      ansible.builtin.replace:
        path: /tmp/openscap_reports/ssg-rocky9-custom-ds.xml
        regexp: 'redhat-release'
        replace: 'rocky-release'

    - name: Parchear verificación CPE (Cambiar XCCDF para aceptar el entorno Rocky)
      ansible.builtin.replace:
        path: /tmp/openscap_reports/ssg-rocky9-custom-ds.xml
        regexp: 'cpe:/o:redhat:enterprise_linux'
        replace: 'cpe:/o:rocky:rocky'
    # --- FIN DEL PARCHEO DEL DATASTREAM ---

    - name: Ejecutar evaluación OpenSCAP (Servidor CIS Nivel 1) con el XML parcheado
      ansible.builtin.command: >
        oscap xccdf eval
        --profile xccdf_org.ssgproject.content_profile_cis_server_l1
        --results /tmp/openscap_reports/results.xml
        --report /tmp/openscap_reports/report.html
        /tmp/openscap_reports/ssg-rocky9-custom-ds.xml
      register: oscap_scan
      # oscap devuelve el código de salida 2 si se encuentran vulnerabilidades
      failed_when: oscap_scan.rc not in [0, 2]

    - name: Notificar finalización del escaneo
      block:
        - name: 1a. Definir variables base para la nomenclatura
          ansible.builtin.set_fact:
            os_ver: "{{ ansible_distribution | lower | replace(' ', '') | replace('linux', '') }}{{ ansible_distribution_version | replace('.', '') }}"
            target_name: "{{ inventory_hostname }}"
            benchmark: "cis_server_l1"

        - name: 1b. Construir el nombre de archivo dinámico final
          ansible.builtin.set_fact:
            file_base: "{{ ansible_date_time.date }}-{{ ansible_date_time.hour }}T{{ ansible_date_time.minute }}-{{ os_ver }}-{{ benchmark }}-{{ target_name }}"

        - name: 2. Obtener reporte XML del objetivo escaneado al contenedor AWX
          ansible.builtin.fetch:
            src: /tmp/openscap_reports/results.xml
            dest: "/tmp/{{ file_base }}.xml"
            flat: yes

        - name: 3. Obtener reporte HTML del objetivo escaneado al contenedor AWX
          ansible.builtin.fetch:
            src: /tmp/openscap_reports/report.html
            dest: "/tmp/{{ file_base }}.html"
            flat: yes

        - name: 4. Asegurar que el directorio de destino exista en el Host AWX
          ansible.builtin.file:
            path: /home/ibai/awx-poc-tfg/reportes
            state: directory
            mode: '0755'
          delegate_to: SLKVAWXTFGDES
          become: yes

        - name: 5. Mover los reportes del contenedor AWX al Host AWX
          ansible.builtin.copy:
            src: "/tmp/{{ file_base }}.{{ item }}"
            dest: "/home/ibai/awx-poc-tfg/reportes/{{ file_base }}.{{ item }}"
          delegate_to: SLKVAWXTFGDES
          loop:
            - xml
            - html

    - name: Limpiar archivos temporales y XML modificado en el objetivo
      ansible.builtin.file:
        path: /tmp/openscap_reports
        state: absent
