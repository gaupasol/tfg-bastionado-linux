---
- name: "Evaluación de Seguridad: OpenSCAP CIS (Multi-OS)"
  hosts: "all:!SLKVAWXTFGDES"
  become: yes
  gather_facts: yes
  vars:
    # These variables can be overridden by AWX Surveys
    cis_level: "1" 
    cis_profile: "Server" 
    
    # Base directory for storage on SLKVAWXTFGDES
    awx_report_base_dir: "/home/ibai/awx-poc-tfg/reportes"

    # OS-specific mapping for datastreams and packages
    oscap_config_map:
      "Rocky_9":
        pkg_name: "openscap-scanner"
        github_url: "https://raw.githubusercontent.com/gaupasol/tfg-bastionado-linux/main/resources/scans/openSCAP/ssg-rhel9-ds.xml"
        xml_name: "ssg-rhel9-ds.xml"
      "Ubuntu_22":
        pkg_name: "libopenscap8"
        github_url: "https://raw.githubusercontent.com/gaupasol/tfg-bastionado-linux/main/resources/scans/openSCAP/ssg-ubuntu2204-ds.xml"
        xml_name: "ssg-ubuntu2204-ds.xml"

  tasks:
    # ==========================================
    # PHASE 1: VALIDATION & OS DETECTION
    # ==========================================
    - name: "VALIDACIÓN | Asegurar que el nivel y perfil introducidos son correctos"
      ansible.builtin.fail:
        msg: "Error: Configuración de nivel o perfil no válidos."
      when: 
        - cis_level | string not in ['1', '2']
        - cis_profile not in ['Server', 'Workstation']

    - name: "VARIABLES | Detectar clave de OS"
      ansible.builtin.set_fact:
        os_key: "{{ ansible_distribution }}_{{ ansible_distribution_major_version }}"

    - name: "VALIDACIÓN | Asegurar que el sistema operativo está soportado"
      ansible.builtin.fail:
        msg: "Error: No hay configuración de OpenSCAP para este OS ({{ os_key }})."
      when: os_key not in oscap_config_map

    - name: "VARIABLES | Asignar configuración específica del OS y crear perfil dinámico"
      ansible.builtin.set_fact:
        oscap_pkg: "{{ oscap_config_map[os_key].pkg_name }}"
        oscap_url: "{{ oscap_config_map[os_key].github_url }}"
        oscap_xml_name: "{{ oscap_config_map[os_key].xml_name }}"
        os_name_print: "{{ ansible_distribution | upper }} {{ ansible_distribution_version }}"
        oscap_profile: >-
          {%- if os_key == 'Ubuntu_22' -%}
          xccdf_org.ssgproject.content_profile_cis_level{{ cis_level }}_{{ cis_profile | lower }}
          {%- elif os_key == 'Rocky_9' -%}
          xccdf_org.ssgproject.content_profile_cis_{{ cis_profile | lower }}_l{{ cis_level }}
          {%- endif -%}

    # ==========================================
    # PHASE 2: PREPARATION & DATASTREAM FETCH
    # ==========================================
    - name: "PREPARACIÓN | Instalar dependencias del escáner OpenSCAP en el objetivo"
      ansible.builtin.package:
        name: "{{ oscap_pkg }}"
        state: present

    - name: "SISTEMA DE ARCHIVOS | Crear directorio temporal en el objetivo (/opt)"
      ansible.builtin.file:
        path: /opt/openscap_reports
        state: directory
        mode: '0755'

    - name: "RED | Descargar el datastream desde GitHub al nodo de control (AWX)"
      ansible.builtin.get_url:
        url: "{{ oscap_url }}"
        dest: "/tmp/{{ oscap_xml_name }}"
        mode: '0644'
      delegate_to: localhost
      # run_once: yes has been removed so it triggers for both Rocky and Ubuntu
      become: no

    - name: "SISTEMA DE ARCHIVOS | Copiar el datastream desde AWX al objetivo (Air-gapped)"
      ansible.builtin.copy:
        src: "/tmp/{{ oscap_xml_name }}"
        dest: "/opt/openscap_reports/{{ oscap_xml_name }}"

    - name: "PARCHEO | Modificar verificación RPM y CPE (Solo Rocky Linux)"
      ansible.builtin.replace:
        path: "/opt/openscap_reports/{{ oscap_xml_name }}"
        regexp: "{{ item.regex }}"
        replace: "{{ item.replacement }}"
      when: os_key == 'Rocky_9'
      loop:
        - { regex: 'redhat-release', replacement: 'rocky-release' }
        - { regex: 'cpe:/o:redhat:enterprise_linux', replacement: 'cpe:/o:rocky:rocky' }

    # ==========================================
    # PHASE 3: EXECUTION
    # ==========================================
    - name: "LOG | Informar sobre el inicio del escaneo"
      ansible.builtin.debug:
        msg: "Iniciando escaneo OpenSCAP con el perfil '{{ oscap_profile }}'. Esto puede tardar unos minutos..."

    - name: "EJECUCIÓN | Lanzar evaluación OpenSCAP en el objetivo"
      ansible.builtin.command: >
        oscap xccdf eval
        --profile {{ oscap_profile }}
        --results /opt/openscap_reports/results.xml
        --report /opt/openscap_reports/report.html
        /opt/openscap_reports/{{ oscap_xml_name }}
      register: oscap_scan
      # OpenSCAP outputs exit code 2 when vulnerabilities are found
      failed_when: oscap_scan.rc not in [0, 2]

    # ==========================================
    # PHASE 4: EXTRACTION & ROUTING
    # ==========================================
    - name: "PROCESAMIENTO | Bloque de extracción y almacenamiento de reportes"
      block:
        - name: "VARIABLES | Generar nomenclatura dinámica de archivos y carpetas"
          ansible.builtin.set_fact:
            os_ver: "{{ ansible_distribution | lower | replace(' ', '') | replace('linux', '') }}{{ ansible_distribution_version | replace('.', '') }}"
            target_name: "{{ inventory_hostname }}"
            scan_type: "escaneo-CIS-L{{ cis_level }}-{{ cis_profile }}"
            unique_id: "{{ 100000000 | random | to_uuid | split('-') | first | upper }}"

        - name: "VARIABLES | Construir rutas y base de archivos"
          ansible.builtin.set_fact:
            file_base: "{{ ansible_date_time.date }}-{{ unique_id }}-{{ os_ver }}-CIS-L{{ cis_level }}-{{ target_name }}"
            report_dir: "{{ awx_report_base_dir }}/{{ target_name }}/{{ ansible_date_time.date }}-{{ unique_id }}-{{ scan_type }}"

        - name: "RED | Extraer reporte XML crudo desde el objetivo hacia AWX"
          ansible.builtin.fetch:
            src: /opt/openscap_reports/results.xml
            dest: "/tmp/{{ file_base }}.xml"
            flat: yes

        - name: "RED | Extraer reporte HTML legible desde el objetivo hacia AWX"
          ansible.builtin.fetch:
            src: /opt/openscap_reports/report.html
            dest: "/tmp/{{ file_base }}.html"
            flat: yes

        - name: "SISTEMA DE ARCHIVOS | Asegurar carpetas de destino finales en SLKVAWXTFGDES"
          ansible.builtin.file:
            path: "{{ report_dir }}/{{ item }}"
            state: directory
            mode: '0755'
            owner: ibai
            group: ibai
          delegate_to: SLKVAWXTFGDES
          loop:
            - xml
            - html

        - name: "SISTEMA DE ARCHIVOS | Mover y organizar reportes en SLKVAWXTFGDES"
          ansible.builtin.copy:
            src: "/tmp/{{ file_base }}.{{ item }}"
            dest: "{{ report_dir }}/{{ item }}/{{ file_base }}.{{ item }}"
            owner: ibai
            group: ibai
          delegate_to: SLKVAWXTFGDES
          loop:
            - xml
            - html

    - name: "EXTRACCIÓN | Leer score de cumplimiento desde el XML final en SLKVAWXTFGDES"
      ansible.builtin.shell: "awk -F'[><]' '/<score system=\"urn:xccdf:scoring:default\"/{print $3; exit}' {{ report_dir }}/xml/{{ file_base }}.xml"
      delegate_to: SLKVAWXTFGDES
      register: openscap_score
      changed_when: false

    # ==========================================
    # PHASE 5: SUMMARY & CLEANUP
    # ==========================================
    - name: "RESUMEN | Mostrar resultados finales"
      ansible.builtin.debug:
        msg: 
          - "=================================================================="
          - "ESCANEO COMPLETADO PARA: {{ target_name }}"
          - "SISTEMA: {{ os_name_print }}"
          - "PERFIL: {{ oscap_profile }}"
          - "CUMPLIMIENTO: {{ openscap_score.stdout | float | round(2) }}%"
          - "------------------------------------------------------------------"
          - "UBICACIÓN DE REPORTES EN SLKVAWXTFGDES:"
          - "--> Carpeta Base: {{ report_dir }}"
          - "--> Reporte HTML: {{ report_dir }}/html/{{ file_base }}.html"
          - "--> Reporte XML:  {{ report_dir }}/xml/{{ file_base }}.xml"
          - "=================================================================="

    - name: "LIMPIEZA | Eliminar directorio temporal en el objetivo (/opt)"
      ansible.builtin.file:
        path: /opt/openscap_reports
        state: absent

    - name: "LIMPIEZA | Eliminar archivos temporales en AWX (localhost)"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      delegate_to: localhost
      run_once: yes
      become: no
      ignore_errors: yes
      loop:
        - "/tmp/{{ oscap_config_map['Rocky_9'].xml_name }}"
        - "/tmp/{{ oscap_config_map['Ubuntu_22'].xml_name }}"
        - "/tmp/{{ file_base }}.xml"
        - "/tmp/{{ file_base }}.html"