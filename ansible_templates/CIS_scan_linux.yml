---
- name: "Evaluación de Seguridad: CIS PRO OpenSCAP (Multi-OS)"
  hosts: "all:!SLKVAWXTFGDES"
  become: yes
  gather_facts: yes
  vars:
    # AWX Survey Variables (Defaults)
    cis_level: "1" 
    cis_profile: "Server" 
    
    # Base directory for storage on SLKVAWXTFGDES
    awx_report_base_dir: "/home/ibai/awx-poc-tfg/reportes"

    # Profile string based on Survey
    oscap_profile: "xccdf_org.cisecurity.benchmarks_profile_Level_{{ cis_level }}_-_{{ cis_profile }}"

    # OS-specific mapping for paths, files, and patches
    oscap_config_map:
      "Rocky_9":
        pkg_list:
          - openscap-scanner
          - openscap-engine-sce
          - tar
        source_dir: "/home/ibai/awx-poc-tfg/CIS-PRO-xml/rl9"
        xccdf_file: "CIS_Rocky_Linux_9_Benchmark_v2.0.0-xccdf.xml"
        cpe_file: "CIS_Rocky_Linux_9_Benchmark_v2.0.0-cpe-dictionary.xml"
        patches:
          - 'sed -i ''s|idref="cpe:2.3:o:rocky:rocky_linux:9[^"]*"|idref="cpe:/o:rocky:rocky_linux:9"|g'' CIS_Rocky_Linux_9_Benchmark_v2.0.0-xccdf.xml'
      "Ubuntu_22":
        pkg_list:
          - libopenscap8
          - tar
        source_dir: "/home/ibai/awx-poc-tfg/CIS-PRO-xml/ubn2204"
        xccdf_file: "CIS_Ubuntu_Linux_22.04_LTS_Benchmark_v3.0.0-xccdf.xml"
        cpe_file: "CIS_Ubuntu_Linux_22.04_LTS_Benchmark_v3.0.0-cpe-dictionary.xml"
        patches:
          - 'sed -i ''s|idref="cpe:2.3:o:canonical:ubuntu_linux:22.04[^"]*"|idref="cpe:/o:canonical:ubuntu_linux:22.04"|g'' CIS_Ubuntu_Linux_22.04_LTS_Benchmark_v3.0.0-xccdf.xml'
          - 'sed -i ''/xccdf_org.cisecurity.benchmarks_rule_2.3.3.1_Ensure_chrony_is_configured_with_authorized_timeserver/s/selected="[^"]*"/selected="false"/g'' CIS_Ubuntu_Linux_22.04_LTS_Benchmark_v3.0.0-xccdf.xml'

  tasks:
    # ==========================================
    # PHASE 1: VALIDATION & OS DETECTION
    # ==========================================
    - name: "VALIDACIÓN | Asegurar que el nivel y perfil introducidos son correctos"
      ansible.builtin.fail:
        msg: "Error: Configuración de nivel o perfil no válidos."
      when: 
        - cis_level | string not in ['1', '2']
        - cis_profile not in ['Server', 'Workstation']

    - name: "VARIABLES | Detectar clave de OS"
      ansible.builtin.set_fact:
        os_key: "{{ ansible_distribution }}_{{ ansible_distribution_major_version }}"

    - name: "VALIDACIÓN | Asegurar que el sistema operativo está soportado"
      ansible.builtin.fail:
        msg: "Error: No hay configuración de OpenSCAP CIS PRO para este OS ({{ os_key }})."
      when: os_key not in oscap_config_map

    - name: "VARIABLES | Asignar configuración específica del OS"
      ansible.builtin.set_fact:
        oscap_config: "{{ oscap_config_map[os_key] }}"
        os_name_print: "{{ ansible_distribution | upper }} {{ ansible_distribution_version }}"

    # ==========================================
    # PHASE 2: PREPARATION & ASSET FETCH
    # ==========================================
    - name: "PREPARACIÓN | Instalar dependencias en el objetivo (Rocky)"
      ansible.builtin.dnf:
        name: "{{ oscap_config.pkg_list }}"
        state: present
      when: ansible_os_family == 'RedHat'

    - name: "PREPARACIÓN | Instalar dependencias en el objetivo (Ubuntu)"
      ansible.builtin.apt:
        name: "{{ oscap_config.pkg_list }}"
        state: present
        update_cache: yes
      when: ansible_os_family == 'Debian'

    - name: "SISTEMA DE ARCHIVOS | Crear directorios de escaneo en el objetivo (/opt)"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/openscap_reports
        - /opt/openscap_reports/scan_data

    - name: "SISTEMA DE ARCHIVOS | Comprimir directorio CIS PRO específico por OS en origen"
      ansible.builtin.command: "tar -czf /tmp/cis_pro_{{ os_key }}.tgz -C {{ oscap_config.source_dir }} ."
      delegate_to: SLKVAWXTFGDES
      become: yes
      
    - name: "RED | Descargar paquete comprimido al nodo AWX"
      ansible.builtin.fetch:
        src: "/tmp/cis_pro_{{ os_key }}.tgz"
        dest: "/tmp/cis_pro_{{ os_key }}.tgz"
        flat: yes
      delegate_to: SLKVAWXTFGDES
      become: yes

    - name: "SISTEMA DE ARCHIVOS | Copiar paquete desde AWX al objetivo"
      ansible.builtin.copy:
        src: "/tmp/cis_pro_{{ os_key }}.tgz"
        dest: "/opt/openscap_reports/cis_pro_scan.tgz"

    - name: "SISTEMA DE ARCHIVOS | Descomprimir paquete en el objetivo"
      ansible.builtin.unarchive:
        src: "/opt/openscap_reports/cis_pro_scan.tgz"
        dest: "/opt/openscap_reports/scan_data/"
        remote_src: yes

    - name: "SISTEMA DE ARCHIVOS | Asegurar que los scripts SCE sean ejecutables"
      ansible.builtin.command: "chmod -R +x /opt/openscap_reports/scan_data/sce/"
      ignore_errors: yes # Prevents failing if the /sce directory does not exist in a benchmark

    - name: "PARCHEO | Aplicar parches efímeros al XCCDF"
      ansible.builtin.shell: "{{ item }}"
      args:
        chdir: "/opt/openscap_reports/scan_data"
      loop: "{{ oscap_config.patches }}"

    # ==========================================
    # PHASE 3: EXECUTION
    # ==========================================
    - name: "LOG | Informar sobre el inicio del escaneo"
      ansible.builtin.debug:
        msg: "Iniciando escaneo OpenSCAP CIS PRO con el perfil '{{ oscap_profile }}'. Esto puede tardar unos minutos..."

    - name: "EJECUCIÓN | Lanzar evaluación OpenSCAP en el objetivo"
      ansible.builtin.command: >
        oscap xccdf eval
        --cpe {{ oscap_config.cpe_file }}
        --profile {{ oscap_profile }}
        --results /opt/openscap_reports/results.xml
        --report /opt/openscap_reports/report.html
        {{ oscap_config.xccdf_file }}
      args:
        chdir: "/opt/openscap_reports/scan_data"
      register: oscap_scan
      failed_when: oscap_scan.rc not in [0, 2]

    # ==========================================
    # PHASE 4: EXTRACTION & ROUTING
    # ==========================================
    - name: "PROCESAMIENTO | Bloque de extracción y almacenamiento de reportes"
      block:
        - name: "VARIABLES | Generar nomenclatura dinámica de archivos y carpetas"
          ansible.builtin.set_fact:
            os_ver: "{{ ansible_distribution | lower | replace(' ', '') | replace('linux', '') }}{{ ansible_distribution_version | replace('.', '') }}"
            target_name: "{{ inventory_hostname }}"
            unique_id: "{{ 100000000 | random | to_uuid | split('-') | first | upper }}"
            scan_type: "escaneo-CIS-PRO-L{{ cis_level }}-{{ cis_profile }}"

        - name: "VARIABLES | Construir rutas y base de archivos"
          ansible.builtin.set_fact:
            file_base: "{{ ansible_date_time.date }}-{{ unique_id }}-{{ os_ver }}-CIS-PRO-L{{ cis_level }}-{{ target_name }}"
            report_dir: "{{ awx_report_base_dir }}/{{ target_name }}/{{ ansible_date_time.date }}-{{ unique_id }}-{{ scan_type }}"

        - name: "RED | Extraer reporte XML crudo desde el objetivo hacia AWX"
          ansible.builtin.fetch:
            src: /opt/openscap_reports/results.xml
            dest: "/tmp/{{ file_base }}.xml"
            flat: yes

        - name: "RED | Extraer reporte HTML legible desde el objetivo hacia AWX"
          ansible.builtin.fetch:
            src: /opt/openscap_reports/report.html
            dest: "/tmp/{{ file_base }}.html"
            flat: yes

        - name: "SISTEMA DE ARCHIVOS | Asegurar carpetas de destino finales en SLKVAWXTFGDES"
          ansible.builtin.file:
            path: "{{ report_dir }}/{{ item }}"
            state: directory
            mode: '0755'
            owner: ibai
            group: ibai
          delegate_to: SLKVAWXTFGDES
          become: yes
          loop:
            - xml
            - html

        - name: "SISTEMA DE ARCHIVOS | Mover y organizar reportes en SLKVAWXTFGDES"
          ansible.builtin.copy:
            src: "/tmp/{{ file_base }}.{{ item }}"
            dest: "{{ report_dir }}/{{ item }}/{{ file_base }}.{{ item }}"
            owner: ibai
            group: ibai
          delegate_to: SLKVAWXTFGDES
          become: yes
          loop:
            - xml
            - html

    - name: "EXTRACCIÓN | Leer score de cumplimiento desde el XML final en SLKVAWXTFGDES"
      ansible.builtin.shell: "awk -F'[><]' '/<score system=\"urn:xccdf:scoring:default\"/{print $3; exit}' {{ report_dir }}/xml/{{ file_base }}.xml"
      delegate_to: SLKVAWXTFGDES
      register: openscap_score
      changed_when: false
      become: yes

    # ==========================================
    # PHASE 5: SUMMARY & CLEANUP
    # ==========================================
    - name: "RESUMEN | Mostrar resultados finales"
      ansible.builtin.debug:
        msg: 
          - "=================================================================="
          - "ESCANEO COMPLETADO PARA: {{ target_name }}"
          - "SISTEMA: {{ os_name_print }}"
          - "PERFIL: {{ oscap_profile }}"
          - "CUMPLIMIENTO: {{ openscap_score.stdout | float | round(2) }}%"
          - "------------------------------------------------------------------"
          - "UBICACIÓN DE REPORTES EN SLKVAWXTFGDES:"
          - "--> Carpeta Base: {{ report_dir }}"
          - "--> Reporte HTML: {{ report_dir }}/html/{{ file_base }}.html"
          - "--> Reporte XML:  {{ report_dir }}/xml/{{ file_base }}.xml"
          - "=================================================================="

    - name: "LIMPIEZA | Eliminar directorio temporal en el objetivo (/opt)"
      ansible.builtin.file:
        path: /opt/openscap_reports
        state: absent

    - name: "LIMPIEZA | Eliminar archivos temporales en AWX y SLKVAWXTFGDES"
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      delegate_to: "{{ item.host }}"
      become: "{{ item.become }}"
      ignore_errors: yes
      loop:
        - { path: "/tmp/cis_pro_{{ os_key }}.tgz", host: "localhost", become: no }
        - { path: "/tmp/cis_pro_{{ os_key }}.tgz", host: "SLKVAWXTFGDES", become: yes }
        - { path: "/tmp/{{ file_base }}.xml", host: "localhost", become: no }
        - { path: "/tmp/{{ file_base }}.html", host: "localhost", become: no }