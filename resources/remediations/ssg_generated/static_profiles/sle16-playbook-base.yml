- name: Ansible Playbook for xccdf_org.ssgproject.content_profile_base
  hosts: all
  vars:
    var_logind_session_timeout: '300'
    rsyslog_remote_loghost_address: logcollector
    var_selinuxuser_execmod: 'true'
    var_auditd_name_format: fqd
  tasks:

  - name: Gather the package facts
    ansible.builtin.package_facts:
      manager: auto
    tags:
    - always

  - name: Build and Test AIDE Database - Ensure AIDE Is Installed
    ansible.builtin.package:
      name: '{{ item }}'
      state: present
    with_items:
    - aide
    when: ("kernel-default" in ansible_facts.packages or "kernel-default-base" in
      ansible_facts.packages)
    tags:
    - CCE-95701-9
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Ensure libselinux1 is installed
    ansible.builtin.package:
      name: libselinux1
      state: present
    when: ("kernel-default" in ansible_facts.packages or "kernel-default-base" in
      ansible_facts.packages)
    tags:
    - CCE-95712-6
    - PCI-DSSv4-1.2
    - PCI-DSSv4-1.2.6
    - enable_strategy
    - high_severity
    - low_complexity
    - low_disruption
    - no_reboot_needed
    - package_libselinux_installed

  - name: Enable the selinuxuser_execmod SELinux Boolean - Ensure libsemanage2 Installed
    ansible.builtin.package:
      name: libsemanage2
      state: present
    when:
    - ( "kernel" in ansible_facts.packages and "rpm-ostree" in ansible_facts.packages
      and "bootc" in ansible_facts.packages and not "openshift-kubelet" in ansible_facts.packages
      and "ostree" in ansible_proc_cmdline or lookup("env", "container") == "bwrap-osbuild"
      or ansible_facts.selinux.status != "disabled" )
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    tags:
    - CCE-95715-9
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - sebool_selinuxuser_execmod

  - name: Gather the package facts
    ansible.builtin.package_facts:
      manager: auto
    tags:
    - always

  - name: Enable auditd Service - Enable service auditd
    block:

    - name: Enable auditd Service - Enable Service auditd
      ansible.builtin.systemd:
        name: auditd
        enabled: true
        state: started
        masked: false
      when:
      - '"audit" in ansible_facts.packages'
    tags:
    - CCE-95716-7
    - CJIS-5.4.1.1
    - NIST-800-171-3.3.1
    - NIST-800-171-3.3.2
    - NIST-800-171-3.3.6
    - NIST-800-53-AC-2(g)
    - NIST-800-53-AC-6(9)
    - NIST-800-53-AU-10
    - NIST-800-53-AU-12(c)
    - NIST-800-53-AU-14(1)
    - NIST-800-53-AU-2(d)
    - NIST-800-53-AU-3
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SI-4(23)
    - PCI-DSS-Req-10.1
    - PCI-DSSv4-10.2
    - PCI-DSSv4-10.2.1
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - service_auditd_enabled
    - special_service_block
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"audit" in ansible_facts.packages'

  - name: Gather the service facts
    ansible.builtin.service_facts: null
    tags:
    - always

  - name: Build and Test AIDE Database - Ensure Repositories Are Updated
    ansible.builtin.command: zypper -q --no-remote ref
    failed_when: false
    when: ("kernel-default" in ansible_facts.packages or "kernel-default-base" in
      ansible_facts.packages)
    tags:
    - CCE-95701-9
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Check Whether the Stock AIDE Database Exists
    ansible.builtin.stat:
      path: /var/lib/aide/aide.db.new
    register: aide_database_stat
    when: ("kernel-default" in ansible_facts.packages or "kernel-default-base" in
      ansible_facts.packages)
    tags:
    - CCE-95701-9
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Build and Test AIDE Database
    ansible.builtin.command: /usr/bin/aide --init
    changed_when: true
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - not (aide_database_stat.stat.exists is defined and aide_database_stat.stat.exists)
    register: aide_database_init
    tags:
    - CCE-95701-9
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Stage AIDE Database
    ansible.builtin.copy:
      src: /var/lib/aide/aide.db.new
      dest: /var/lib/aide/aide.db
      backup: true
      remote_src: true
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - aide_database_init is changed
    - not ansible_check_mode
    tags:
    - CCE-95701-9
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Configure Systemd Timer Execution of AIDE - Define AIDE Periodic Check Service
    ansible.builtin.blockinfile:
      create: true
      dest: /etc/systemd/system/aidecheck.service
      owner: root
      group: root
      mode: '0644'
      block: |
        [Unit]
        Description=Aide Check
        [Service]
        Type=simple
        ExecStart=/usr/bin/aide --check
        [Install]
        WantedBy=multi-user.target
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - ( "aide" in ansible_facts.packages and "systemd" in ansible_facts.packages )
    tags:
    - CCE-95702-7
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SI-7
    - NIST-800-53-SI-7(1)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_periodic_checking_systemd_timer
    - configure_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed

  - name: Configure Systemd Timer Execution of AIDE - Define AIDE Periodic Check Service
      Timer
    ansible.builtin.blockinfile:
      create: true
      dest: /etc/systemd/system/aidecheck.timer
      owner: root
      group: root
      mode: '0644'
      block: |
        [Unit]
        Description=Aide check every day at 5AM
        [Timer]
        OnCalendar=*-*-* 05:00:00
        Unit=aidecheck.service
        [Install]
        WantedBy=multi-user.target
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - ( "aide" in ansible_facts.packages and "systemd" in ansible_facts.packages )
    tags:
    - CCE-95702-7
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SI-7
    - NIST-800-53-SI-7(1)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_periodic_checking_systemd_timer
    - configure_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed

  - name: Configure Systemd Timer Execution of AIDE - Ensure AIDE Service is Enabled
    ansible.builtin.systemd:
      name: aidecheck.service
      enabled: true
      daemon_reload: true
      masked: false
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - ( "aide" in ansible_facts.packages and "systemd" in ansible_facts.packages )
    tags:
    - CCE-95702-7
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SI-7
    - NIST-800-53-SI-7(1)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_periodic_checking_systemd_timer
    - configure_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed

  - name: Configure Systemd Timer Execution of AIDE - Ensure AIDE Service Timer is
      Enabled
    ansible.builtin.systemd:
      name: aidecheck.timer
      state: started
      enabled: true
      daemon_reload: true
      masked: false
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - ( "aide" in ansible_facts.packages and "systemd" in ansible_facts.packages )
    tags:
    - CCE-95702-7
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SI-7
    - NIST-800-53-SI-7(1)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_periodic_checking_systemd_timer
    - configure_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed

  - name: Ensure PAM Displays Last Logon/Access Notification - Check if system relies
      on authselect tool
    ansible.builtin.stat:
      path: /usr/bin/authselect
    register: result_authselect_present
    when: ( "pam" in ansible_facts.packages and ("kernel-default" in ansible_facts.packages
      or "kernel-default-base" in ansible_facts.packages) )
    tags:
    - CCE-95704-3
    - CJIS-5.5.2
    - NIST-800-53-AC-9
    - NIST-800-53-AC-9(1)
    - PCI-DSS-Req-10.2.4
    - PCI-DSSv4-10.2
    - PCI-DSSv4-10.2.1
    - PCI-DSSv4-10.2.1.4
    - configure_strategy
    - display_login_attempts
    - low_complexity
    - low_disruption
    - low_severity
    - no_reboot_needed

  - name: Ensure PAM Displays Last Logon/Access Notification - Collect the Available
      authselect Features
    ansible.builtin.command:
      cmd: authselect list-features sssd
    register: result_authselect_available_features
    changed_when: false
    check_mode: false
    when:
    - ( "pam" in ansible_facts.packages and ("kernel-default" in ansible_facts.packages
      or "kernel-default-base" in ansible_facts.packages) )
    - result_authselect_present.stat.exists
    tags:
    - CCE-95704-3
    - CJIS-5.5.2
    - NIST-800-53-AC-9
    - NIST-800-53-AC-9(1)
    - PCI-DSS-Req-10.2.4
    - PCI-DSSv4-10.2
    - PCI-DSSv4-10.2.1
    - PCI-DSSv4-10.2.1.4
    - configure_strategy
    - display_login_attempts
    - low_complexity
    - low_disruption
    - low_severity
    - no_reboot_needed

  - name: Ensure PAM Displays Last Logon/Access Notification - Configure pam_lastlog2.so
      Using authselect Feature
    block:

    - name: Ensure PAM Displays Last Logon/Access Notification - Check integrity of
        authselect current profile
      ansible.builtin.command:
        cmd: authselect check
      register: result_authselect_check_cmd
      changed_when: false
      check_mode: false
      failed_when: false

    - name: Ensure PAM Displays Last Logon/Access Notification - Informative message
        based on the authselect integrity check result
      ansible.builtin.assert:
        that:
        - ansible_check_mode or result_authselect_check_cmd.rc == 0
        fail_msg:
        - authselect integrity check failed. Remediation aborted!
        - This remediation could not be applied because an authselect profile was
          not selected or the selected profile is not intact.
        - It is not recommended to manually edit the PAM files when authselect tool
          is available.
        - In cases where the default authselect profile does not cover a specific
          demand, a custom authselect profile is recommended.
        success_msg:
        - authselect integrity check passed

    - name: Ensure PAM Displays Last Logon/Access Notification - Get authselect Features
        Currently Enabled
      ansible.builtin.shell:
        cmd: authselect current | tail -n+3 | awk '{ print $2 }'
      register: result_authselect_features
      changed_when: false
      check_mode: false
      when:
      - result_authselect_check_cmd is success

    - name: Ensure PAM Displays Last Logon/Access Notification - Ensure "with-silent-lastlog"
        Feature is Disabled Using authselect Tool
      ansible.builtin.command:
        cmd: authselect disable-feature with-silent-lastlog
      register: result_authselect_disable_feature_cmd
      when:
      - result_authselect_check_cmd is success
      - result_authselect_features.stdout is search("with-silent-lastlog")

    - name: Ensure PAM Displays Last Logon/Access Notification - Ensure authselect
        changes are applied
      ansible.builtin.command:
        cmd: authselect apply-changes -b
      when:
      - result_authselect_disable_feature_cmd is not skipped
      - result_authselect_disable_feature_cmd is success
    when:
    - ( "pam" in ansible_facts.packages and ("kernel-default" in ansible_facts.packages
      or "kernel-default-base" in ansible_facts.packages) )
    - result_authselect_present.stat.exists
    - result_authselect_available_features.stdout is search("with-silent-lastlog")
    tags:
    - CCE-95704-3
    - CJIS-5.5.2
    - NIST-800-53-AC-9
    - NIST-800-53-AC-9(1)
    - PCI-DSS-Req-10.2.4
    - PCI-DSSv4-10.2
    - PCI-DSSv4-10.2.1
    - PCI-DSSv4-10.2.1.4
    - configure_strategy
    - display_login_attempts
    - low_complexity
    - low_disruption
    - low_severity
    - no_reboot_needed

  - name: Ensure PAM Displays Last Logon/Access Notification - Configure pam_lastlog2.so
      in appropriate PAM files
    block:

    - name: Ensure PAM Displays Last Logon/Access Notification - Define the PAM file
        to be edited as a local fact
      ansible.builtin.set_fact:
        pam_file_path: /etc/pam.d/postlogin-session

    - name: Ensure PAM Displays Last Logon/Access Notification - Check if system relies
        on authselect tool
      ansible.builtin.stat:
        path: /usr/bin/authselect
      register: result_authselect_present

    - name: Ensure PAM Displays Last Logon/Access Notification - Ensure authselect
        custom profile is used if authselect is present
      block:

      - name: Ensure PAM Displays Last Logon/Access Notification - Check integrity
          of authselect current profile
        ansible.builtin.command:
          cmd: authselect check
        register: result_authselect_check_cmd
        changed_when: false
        check_mode: false
        failed_when: false

      - name: Ensure PAM Displays Last Logon/Access Notification - Informative message
          based on the authselect integrity check result
        ansible.builtin.assert:
          that:
          - ansible_check_mode or result_authselect_check_cmd.rc == 0
          fail_msg:
          - authselect integrity check failed. Remediation aborted!
          - This remediation could not be applied because an authselect profile was
            not selected or the selected profile is not intact.
          - It is not recommended to manually edit the PAM files when authselect tool
            is available.
          - In cases where the default authselect profile does not cover a specific
            demand, a custom authselect profile is recommended.
          success_msg:
          - authselect integrity check passed

      - name: Ensure PAM Displays Last Logon/Access Notification - Get authselect
          current profile
        ansible.builtin.shell:
          cmd: authselect current -r | awk '{ print $1 }'
        register: result_authselect_profile
        changed_when: false
        when:
        - result_authselect_check_cmd is success

      - name: Ensure PAM Displays Last Logon/Access Notification - Define the current
          authselect profile as a local fact
        ansible.builtin.set_fact:
          authselect_current_profile: '{{ result_authselect_profile.stdout }}'
          authselect_custom_profile: '{{ result_authselect_profile.stdout }}'
        when:
        - result_authselect_profile is not skipped
        - result_authselect_profile.stdout is match("custom/")

      - name: Ensure PAM Displays Last Logon/Access Notification - Define the new
          authselect custom profile as a local fact
        ansible.builtin.set_fact:
          authselect_current_profile: '{{ result_authselect_profile.stdout }}'
          authselect_custom_profile: custom/hardening
        when:
        - result_authselect_profile is not skipped
        - result_authselect_profile.stdout is not match("custom/")

      - name: Ensure PAM Displays Last Logon/Access Notification - Get authselect
          current features to also enable them in the custom profile
        ansible.builtin.shell:
          cmd: authselect current | tail -n+3 | awk '{ print $2 }'
        register: result_authselect_features
        changed_when: false
        check_mode: false
        when:
        - result_authselect_profile is not skipped
        - authselect_current_profile is not match("custom/")

      - name: Ensure PAM Displays Last Logon/Access Notification - Check if any custom
          profile with the same name was already created
        ansible.builtin.stat:
          path: /etc/authselect/{{ authselect_custom_profile }}
        register: result_authselect_custom_profile_present
        changed_when: false
        when:
        - result_authselect_profile is not skipped
        - authselect_current_profile is not match("custom/")

      - name: Ensure PAM Displays Last Logon/Access Notification - Create an authselect
          custom profile based on the current profile
        ansible.builtin.command:
          cmd: authselect create-profile hardening -b {{ authselect_current_profile
            }}
        when:
        - result_authselect_profile is not skipped
        - result_authselect_check_cmd is success
        - authselect_current_profile is not match("^(custom/|local)")
        - not result_authselect_custom_profile_present.stat.exists

      - name: Ensure PAM Displays Last Logon/Access Notification - Create an authselect
          custom profile based on sssd profile
        ansible.builtin.command:
          cmd: authselect create-profile hardening -b sssd
        when:
        - result_authselect_profile is not skipped
        - result_authselect_check_cmd is success
        - authselect_current_profile is match("local")
        - not result_authselect_custom_profile_present.stat.exists

      - name: Ensure PAM Displays Last Logon/Access Notification - Ensure authselect
          changes are applied
        ansible.builtin.command:
          cmd: authselect apply-changes -b --backup=before-hardening-custom-profile
        when:
        - result_authselect_check_cmd is success
        - result_authselect_profile is not skipped
        - authselect_current_profile is not match("custom/")
        - authselect_custom_profile is not match(authselect_current_profile)

      - name: Ensure PAM Displays Last Logon/Access Notification - Ensure the authselect
          custom profile is selected
        ansible.builtin.command:
          cmd: authselect select {{ authselect_custom_profile }}
        register: result_pam_authselect_select_profile
        when:
        - result_authselect_check_cmd is success
        - result_authselect_profile is not skipped
        - authselect_current_profile is not match("custom/")
        - authselect_custom_profile is not match(authselect_current_profile)

      - name: Ensure PAM Displays Last Logon/Access Notification - Restore the authselect
          features in the custom profile
        ansible.builtin.command:
          cmd: authselect enable-feature {{ item }}
        loop: '{{ result_authselect_features.stdout_lines }}'
        register: result_pam_authselect_restore_features
        when:
        - result_authselect_profile is not skipped
        - result_authselect_features is not skipped
        - result_pam_authselect_select_profile is not skipped

      - name: Ensure PAM Displays Last Logon/Access Notification - Ensure authselect
          changes are applied
        ansible.builtin.command:
          cmd: authselect apply-changes -b --backup=after-hardening-custom-profile
        when:
        - result_authselect_check_cmd is success
        - result_authselect_profile is not skipped
        - result_pam_authselect_restore_features is not skipped

      - name: Ensure PAM Displays Last Logon/Access Notification - Change the PAM
          file to be edited according to the custom authselect profile
        ansible.builtin.set_fact:
          pam_file_path: /etc/authselect/{{ authselect_custom_profile }}/{{ pam_file_path
            | basename }}
        when:
        - authselect_custom_profile is defined
      when:
      - result_authselect_present.stat.exists

    - name: Ensure PAM Displays Last Logon/Access Notification - Define a fact for
        control already filtered in case filters are used
      ansible.builtin.set_fact:
        pam_module_control: optional

    - name: Ensure PAM Displays Last Logon/Access Notification - Check if expected
        PAM module line is present in {{ pam_file_path }}
      ansible.builtin.lineinfile:
        path: '{{ pam_file_path }}'
        regexp: ^\s*session\s+{{ pam_module_control | regex_escape() }}\s+pam_lastlog2.so\s*.*
        state: absent
      check_mode: true
      changed_when: false
      register: result_pam_line_present

    - name: Ensure PAM Displays Last Logon/Access Notification - Include or update
        the PAM module line in {{ pam_file_path }}
      block:

      - name: Ensure PAM Displays Last Logon/Access Notification - Check if required
          PAM module line is present in {{ pam_file_path }} with different control
        ansible.builtin.lineinfile:
          path: '{{ pam_file_path }}'
          regexp: ^\s*session\s+.*\s+pam_lastlog2.so\s*
          state: absent
        check_mode: true
        changed_when: false
        register: result_pam_line_other_control_present

      - name: Ensure PAM Displays Last Logon/Access Notification - Ensure the correct
          control for the required PAM module line in {{ pam_file_path }}
        ansible.builtin.replace:
          dest: '{{ pam_file_path }}'
          regexp: ^(\s*session\s+).*(\bpam_lastlog2.so.*)
          replace: \1{{ pam_module_control }} \2
        register: result_pam_module_edit
        when:
        - result_pam_line_other_control_present.found == 1

      - name: Ensure PAM Displays Last Logon/Access Notification - Ensure the required
          PAM module line is included in {{ pam_file_path }}
        ansible.builtin.lineinfile:
          dest: '{{ pam_file_path }}'
