      state: present
    when: ( "kernel" in ansible_facts.packages )
    tags:
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-1.4.1
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - package_iptables_installed

