  - name: 'Ensure Red Hat GPG Key Installed: Read signatures in GPG key'
    ansible.builtin.command: gpg --show-keys --with-fingerprint --with-colons "/etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release"
