    - no_reboot_needed
    - restrict_strategy

  - name: 'Ensure Red Hat GPG Key Installed: Set Fact - Valid fingerprints'
    ansible.builtin.set_fact:
      gpg_valid_fingerprints:
      - 567E347AD0044ADE55BA8A5F199E2F91FD431D51
      - 6A6AA7C97C8890AEC6AEBFE2F76F66C3D4082792
    tags:
    - CJIS-5.10.4.1
    - NIST-800-171-3.4.8
    - NIST-800-53-CM-5(3)
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SC-12
    - NIST-800-53-SC-12(3)
