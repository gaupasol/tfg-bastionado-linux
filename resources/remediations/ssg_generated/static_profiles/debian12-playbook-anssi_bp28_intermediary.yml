- name: Ansible Playbook for xccdf_org.ssgproject.content_profile_anssi_bp28_intermediary
  hosts: all
  vars:
    var_sudo_umask: '0077'
    var_password_pam_unix_remember: '2'
    var_password_pam_dcredit: '-1'
    var_password_pam_lcredit: '-1'
