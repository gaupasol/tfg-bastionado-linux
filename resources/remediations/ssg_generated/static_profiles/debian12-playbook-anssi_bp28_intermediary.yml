  - name: Gather the service facts
    ansible.builtin.service_facts: null
    tags:
    - always

  - name: Build and Test AIDE Database - Ensure AIDE Is Installed
    ansible.builtin.apt:
      name: aide
      state: present
    when: '"linux-base" in ansible_facts.packages'
    tags:
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Check if DB Path in /etc/aide/aide.conf Is
      Already Set
    ansible.builtin.lineinfile:
      path: /etc/aide/aide.conf
      regexp: ^#?(\s*)(database=)(.*)$
      state: absent
    check_mode: true
    changed_when: false
    register: database_replace
    when: '"linux-base" in ansible_facts.packages'
    tags:
    - CJIS-5.10.1.3
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Check if DB Out Path in /etc/aide/aide.conf
