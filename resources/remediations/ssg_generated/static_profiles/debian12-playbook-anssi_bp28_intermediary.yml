    - PCI-DSSv4-2.2.6
    - configure_strategy
    - file_permissions_sshd_private_key
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed

  - name: Find /etc/ssh/ file(s)
    ansible.builtin.command: find -P /etc/ssh/ -maxdepth 1 -perm /u+xs,g+xws,o+xwt  -type
      f -regextype posix-extended -regex "^.*\.pub$"
    register: files_found
    changed_when: false
    failed_when: false
    check_mode: false
    when: '"linux-base" in ansible_facts.packages'
    tags:
    - NIST-800-171-3.1.13
    - NIST-800-171-3.13.10
    - NIST-800-53-AC-17(a)
    - NIST-800-53-AC-6(1)
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-2.2.4
    - PCI-DSSv4-2.2
    - PCI-DSSv4-2.2.6
    - configure_strategy
    - file_permissions_sshd_pub_key
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed

  - name: Set permissions for /etc/ssh/ file(s)
    ansible.builtin.file:
      path: '{{ item }}'
      mode: u-xs,g-xws,o-xwt
      state: file
    with_items:
    - '{{ files_found.stdout_lines }}'
    when: '"linux-base" in ansible_facts.packages'
    tags:
    - NIST-800-171-3.1.13
    - NIST-800-171-3.13.10
    - NIST-800-53-AC-17(a)
    - NIST-800-53-AC-6(1)
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-2.2.4
    - PCI-DSSv4-2.2
    - PCI-DSSv4-2.2.6
    - configure_strategy
    - file_permissions_sshd_pub_key
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed

  - name: Disable SSH Root Login
    block:

    - name: Check for duplicate values
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        create: true
        regexp: (?i)(?i)^\s*PermitRootLogin\s+
        state: absent
      check_mode: true
      changed_when: false
      register: dupes

    - name: Deduplicate values from /etc/ssh/sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        create: true
        regexp: (?i)(?i)^\s*PermitRootLogin\s+
        state: absent
      when: dupes.found is defined and dupes.found > 1

    - name: Insert correct line to /etc/ssh/sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        create: true
        regexp: (?i)(?i)^\s*PermitRootLogin\s+
        line: PermitRootLogin no
        state: present
        insertbefore: BOF
        validate: /usr/sbin/sshd -t -f %s
    when: '"linux-base" in ansible_facts.packages'
    tags:
    - CJIS-5.5.6
    - NIST-800-171-3.1.1
    - NIST-800-171-3.1.5
    - NIST-800-53-AC-17(a)
    - NIST-800-53-AC-6(2)
    - NIST-800-53-CM-6(a)
    - NIST-800-53-CM-7(a)
    - NIST-800-53-CM-7(b)
    - NIST-800-53-IA-2
    - NIST-800-53-IA-2(5)
    - PCI-DSS-Req-2.2.4
    - PCI-DSSv4-2.2
    - PCI-DSSv4-2.2.6
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy
    - sshd_disable_root_login

  - name: Configure PAM in SSSD Services - Find all the conf files inside the /etc/sssd/conf.d/
      directory
    ansible.builtin.find:
      paths:
      - /etc/sssd/conf.d/
      patterns: '*.conf'
    register: sssd_conf_d_files
    when: '"sssd-common" in ansible_facts.packages'
    tags:
    - NIST-800-53-CM-6(a)
    - NIST-800-53-IA-2(1)
    - configure_strategy
    - low_complexity
    - medium_disruption
    - medium_severity
    - no_reboot_needed
    - sssd_enable_pam_services

  - name: Configure PAM in SSSD Services - Modify lines in files in the /etc/sssd/conf.d/
      directory
    ansible.builtin.replace:
      path: '{{ item }}'
      regexp: ^(\s*\[sssd\].*(?:\n\s*[^[\s].*)*\n\s*services\s*=(?!.*\bpam\b).*)$
      replace: \1,pam
    with_items: '{{ sssd_conf_d_files.files | map(attribute=''path'') }}'
    register: modify_lines_sssd_conf_d_files
    when:
    - '"sssd-common" in ansible_facts.packages'
    - sssd_conf_d_files.matched is defined and sssd_conf_d_files.matched >= 1
    tags:
    - NIST-800-53-CM-6(a)
    - NIST-800-53-IA-2(1)
    - configure_strategy
    - low_complexity
    - medium_disruption
    - medium_severity
    - no_reboot_needed
    - sssd_enable_pam_services

  - name: Configure PAM in SSSD Services - Find /etc/sssd/sssd.conf
    ansible.builtin.stat:
      path: /etc/sssd/sssd.conf
    register: sssd_conf_file
    when: '"sssd-common" in ansible_facts.packages'
    tags:
    - NIST-800-53-CM-6(a)
    - NIST-800-53-IA-2(1)
    - configure_strategy
    - low_complexity
    - medium_disruption
    - medium_severity
    - no_reboot_needed
    - sssd_enable_pam_services

  - name: Configure PAM in SSSD Services - Modify lines in /etc/sssd/sssd.conf
    ansible.builtin.replace:
      path: /etc/sssd/sssd.conf
      regexp: ^(\s*\[sssd\].*(?:\n\s*[^[\s].*)*\n\s*services\s*=(?!.*\bpam\b).*)$
      replace: \1,pam
    register: modify_lines_sssd_conf_file
    when:
    - '"sssd-common" in ansible_facts.packages'
    - sssd_conf_file.stat.exists
    tags:
    - NIST-800-53-CM-6(a)
    - NIST-800-53-IA-2(1)
    - configure_strategy
    - low_complexity
    - medium_disruption
    - medium_severity
    - no_reboot_needed
    - sssd_enable_pam_services

  - name: Configure PAM in SSSD Services - Find services key in /etc/sssd/sssd.conf
    ansible.builtin.replace:
      path: /etc/sssd/sssd.conf
      regexp: ^\s*\[sssd\][^\[\]]*?(?:\n(?!\[)[^\n]*?services\s*=)+
      replace: ''
    changed_when: false
    check_mode: true
    register: sssd_conf_file_services
    when:
    - '"sssd-common" in ansible_facts.packages'
    - sssd_conf_file.stat.exists
    tags:
    - NIST-800-53-CM-6(a)
    - NIST-800-53-IA-2(1)
    - configure_strategy
    - low_complexity
    - medium_disruption
    - medium_severity
    - no_reboot_needed
    - sssd_enable_pam_services

  - name: Configure PAM in SSSD Services - Insert entry to /etc/sssd/sssd.conf
    community.general.ini_file:
      path: /etc/sssd/sssd.conf
      section: sssd
      option: services
      value: pam
    when:
    - '"sssd-common" in ansible_facts.packages'
    - not modify_lines_sssd_conf_d_files.changed
    - not modify_lines_sssd_conf_file.changed
    - (sssd_conf_file_services.msg is defined and "replacements" not in sssd_conf_file_services.msg)
      or not sssd_conf_file.stat.exists
    tags:
    - NIST-800-53-CM-6(a)
    - NIST-800-53-IA-2(1)
    - configure_strategy
    - low_complexity
    - medium_disruption
    - medium_severity
    - no_reboot_needed
    - sssd_enable_pam_services
