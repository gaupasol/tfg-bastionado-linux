    ansible.builtin.blockinfile:
      path: /etc/profile.d/tmux.sh
      block: |
        if [ "$PS1" ]; then
          parent=$(ps -o ppid= -p $$)
          name=$(ps -o comm= -p $parent)
          case "$name" in sshd|login) exec tmux ;; esac
        fi
      create: true
