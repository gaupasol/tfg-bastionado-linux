    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Disable prelinking
    ansible.builtin.lineinfile:
      path: /etc/sysconfig/prelink
      regexp: ^PRELINKING=
      line: PRELINKING=no
    when: prelink_exists.stat.exists
    tags:
    - CCE-92211-2
    - CJIS-5.10.1.3
    - NIST-800-171-3.13.11
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SC-13
    - PCI-DSS-Req-11.5
    - disable_prelink
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: 'Set fact: Package manager reinstall command'
    ansible.builtin.set_fact:
      package_manager_reinstall_cmd: zypper reinstall -y
    when:
    - not ( "kernel" in ansible_facts.packages and "rpm-ostree" in ansible_facts.packages
      and "bootc" in ansible_facts.packages and not "openshift-kubelet" in ansible_facts.packages
      and "ostree" in ansible_proc_cmdline )
