    - DISA-STIG-SLES-12-010499
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - package_aide_installed

  - name: Build and Test AIDE Database - Ensure AIDE Is Installed
    ansible.builtin.package:
      name: '{{ item }}'
      state: present
    with_items:
    - aide
    when: ("kernel-default" in ansible_facts.packages or "kernel-default-base" in
      ansible_facts.packages)
    tags:
    - CCE-91483-8
    - CJIS-5.10.1.3
    - DISA-STIG-SLES-12-010499
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
