    tags:
    - always

  - name: Enable the pcscd Service - Enable service pcscd
    block:

    - name: Enable the pcscd Service - Enable Service pcscd
      ansible.builtin.systemd:
        name: pcscd
        enabled: true
        state: started
        masked: false
      when:
