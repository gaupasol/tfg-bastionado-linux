    - PCI-DSSv4-10.3
    - PCI-DSSv4-10.3.3
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - package_audit-audispd-plugins_installed

  - name: Gather the package facts
    ansible.builtin.package_facts:
