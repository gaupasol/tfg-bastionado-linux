    ansible.builtin.command:
      cmd: dconf update
    when:
    - '"gdm" in ansible_facts.packages'
    - '"kernel-core" in ansible_facts.packages'
    - not distro_db.stat.exists or distro_keyfiles.files | length > 0 and distro_keyfiles.files
