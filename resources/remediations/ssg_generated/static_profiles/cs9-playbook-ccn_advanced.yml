    - unknown_strategy

  - name: Make sure that the dconf databases are up-to-date with regards to respective
      keyfiles - Get keyfiles for distro
    ansible.builtin.find:
      paths: /etc/dconf/db/distro.d/
    register: distro_keyfiles
    when:
    - '"gdm" in ansible_facts.packages'
    - '"kernel-core" in ansible_facts.packages'
    tags:
    - DISA-STIG-RHEL-09-271090
    - PCI-DSS-Req-6.2
    - PCI-DSSv4-8.2
    - PCI-DSSv4-8.2.8
    - dconf_db_up_to_date
    - high_severity
    - low_complexity
    - medium_disruption
    - no_reboot_needed
    - unknown_strategy

  - name: Make sure that the dconf databases are up-to-date with regards to respective
