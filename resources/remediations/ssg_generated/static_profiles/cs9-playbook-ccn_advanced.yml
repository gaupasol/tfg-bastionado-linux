  - name: Gather the package facts
    ansible.builtin.package_facts:
      manager: auto
    tags:
    - always

  - name: Ensure cryptsetup is installed
    ansible.builtin.package:
      name: cryptsetup
      state: present
    when: '"kernel-core" in ansible_facts.packages'
    tags:
    - PCI-DSSv4-3.5
    - PCI-DSSv4-3.5.1
    - PCI-DSSv4-3.5.1.2
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - package_cryptsetup-luks_installed

  - name: Ensure firewalld is installed
    ansible.builtin.package:
      name: firewalld
      state: present
    when: '"kernel-core" in ansible_facts.packages'
    tags:
    - DISA-STIG-RHEL-09-251010
    - NIST-800-53-CM-6(a)
    - PCI-DSSv4-1.2
    - PCI-DSSv4-1.2.1
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - package_firewalld_installed

  - name: Configure Firewalld to Restrict Loopback Traffic - Ensure firewalld Package
      is Installed
    ansible.builtin.package:
      name: '{{ item }}'
      state: present
    with_items:
    - firewalld
    when: '"kernel-core" in ansible_facts.packages'
    tags:
    - PCI-DSSv4-1.4
    - PCI-DSSv4-1.4.1
    - configure_strategy
    - firewalld_loopback_traffic_restricted
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed

  - name: Configure Firewalld to Trust Loopback Traffic - Ensure firewalld Package
