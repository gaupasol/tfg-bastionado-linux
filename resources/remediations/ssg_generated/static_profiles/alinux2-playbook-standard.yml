        enabled: false
        state: stopped
        masked: true
      when: socket_file_exists.stdout_lines is search("ntpdate.socket", multiline=True)
    tags:
    - NIST-800-53-CM-6(a)
    - NIST-800-53-CM-7(a)
    - NIST-800-53-CM-7(b)
    - disable_strategy
    - low_complexity
    - low_disruption
    - low_severity
    - no_reboot_needed
    - service_ntpdate_disabled
    - special_service_block
    when: '"kernel" in ansible_facts.packages'

  - name: Disable Odd Job Daemon (oddjobd) - Disable service oddjobd
    block:

    - name: Disable Odd Job Daemon (oddjobd) - Collect systemd Services Present in
