        name: abrtd.socket
        enabled: false
        state: stopped
        masked: true
      when: socket_file_exists.stdout_lines is search("abrtd.socket", multiline=True)
    tags:
    - NIST-800-53-CM-6(a)
    - NIST-800-53-CM-7(a)
    - disable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - service_abrtd_disabled
    - special_service_block
    when: '"kernel" in ansible_facts.packages'

  - name: Disable ntpdate Service (ntpdate) - Disable service ntpdate
    block:

    - name: Disable ntpdate Service (ntpdate) - Collect systemd Services Present in
