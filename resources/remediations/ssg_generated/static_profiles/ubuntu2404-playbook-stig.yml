        state: absent
      check_mode: true
      changed_when: false
      register: dupes

    - name: Deduplicate values from /etc/chrony/chrony.conf
      ansible.builtin.lineinfile:
        path: /etc/chrony/chrony.conf
        create: true
        regexp: '(?i)^\s*makestep '
        state: absent
      when: dupes.found is defined and dupes.found > 1

    - name: Insert correct line to /etc/chrony/chrony.conf
      ansible.builtin.lineinfile:
        path: /etc/chrony/chrony.conf
