  - name: Build and Test AIDE Database - Ensure AIDE Is Installed
    ansible.builtin.apt:
      name: aide
      state: present
    when: '"linux-base" in ansible_facts.packages'
    tags:
    - CJIS-5.10.1.3
    - DISA-STIG-UBTU-22-651015
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Check if DB Path in /etc/aide/aide.conf Is
      Already Set
    ansible.builtin.lineinfile:
      path: /etc/aide/aide.conf
      regexp: ^#?(\s*)(database=)(.*)$
      state: absent
    check_mode: true
    changed_when: false
    register: database_replace
    when: '"linux-base" in ansible_facts.packages'
    tags:
    - CJIS-5.10.1.3
    - DISA-STIG-UBTU-22-651015
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Check if DB Out Path in /etc/aide/aide.conf
      Is Already Set
    ansible.builtin.lineinfile:
      path: /etc/aide/aide.conf
      regexp: ^#?(\s*)(database_out=)(.*)$
      state: absent
    check_mode: true
    changed_when: false
    register: database_out_replace
    when: '"linux-base" in ansible_facts.packages'
    tags:
    - CJIS-5.10.1.3
    - DISA-STIG-UBTU-22-651015
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Fix DB Path in Config File if Necessary
    ansible.builtin.lineinfile:
      path: /etc/aide/aide.conf
      regexp: ^#?(\s*)(database)(\s*)=(\s*)(.*)$
      line: \2\3=\4file:/var/lib/aide/aide.db
      backrefs: true
    when:
    - '"linux-base" in ansible_facts.packages'
    - database_replace.found > 0
    tags:
    - CJIS-5.10.1.3
    - DISA-STIG-UBTU-22-651015
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Fix DB Out Path in Config File if Necessary
    ansible.builtin.lineinfile:
      path: /etc/aide/aide.conf
      regexp: ^#?(\s*)(database_out)(\s*)=(\s*)(.*)$
      line: \2\3=\4file:/var/lib/aide/aide.db.new
      backrefs: true
    when:
    - '"linux-base" in ansible_facts.packages'
    - database_out_replace.found > 0
    tags:
    - CJIS-5.10.1.3
    - DISA-STIG-UBTU-22-651015
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Ensure the Default DB Path is Added
    ansible.builtin.lineinfile:
      path: /etc/aide/aide.conf
      line: database=file:/var/lib/aide/aide.db
      create: true
    when:
    - '"linux-base" in ansible_facts.packages'
    - database_replace.found == 0
    tags:
    - CJIS-5.10.1.3
    - DISA-STIG-UBTU-22-651015
    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-11.5
    - PCI-DSSv4-11.5.2
    - aide_build_database
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Build and Test AIDE Database - Ensure the Default Out Path is Added
    ansible.builtin.lineinfile:
      path: /etc/aide/aide.conf
      line: database_out=file:/var/lib/aide/aide.db.new
