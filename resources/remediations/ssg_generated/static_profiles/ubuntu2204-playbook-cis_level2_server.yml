    register: result_pam_auth_file_present
    when:
    - '"linux-base" in ansible_facts.packages'
    - '"libpam-runtime" in ansible_facts.packages'
    tags:
    - CJIS-5.6.2.2
    - DISA-STIG-UBTU-22-611055
    - NIST-800-171-3.13.11
    - NIST-800-53-CM-6(a)
    - NIST-800-53-IA-5(1)(c)
    - NIST-800-53-IA-5(c)
    - PCI-DSS-Req-8.2.1
    - PCI-DSSv4-8.3
    - PCI-DSSv4-8.3.2
