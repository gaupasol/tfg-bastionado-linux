###############################################################################
#
# Ansible Playbook for General System Security Profile for SUSE Linux Enterprise Micro (SLEM) 5
#
# Profile Description:
# This profile contains configuration checks that align to the
# General System Security Profile for SUSE Linux Enterprise Micro (SLEM) 5.
#
# Profile ID:  xccdf_org.ssgproject.content_profile_general
# Benchmark ID:  xccdf_org.ssgproject.content_benchmark_SLMICRO5
# Benchmark Version:  0.1.80
