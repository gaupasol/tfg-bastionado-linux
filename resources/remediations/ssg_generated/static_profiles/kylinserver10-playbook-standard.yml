  - name: Ensure new users receive home directories
    block:

    - name: Check for duplicate values
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        create: true
        regexp: (?i)^\s*CREATE_HOME\s+
        state: absent
      check_mode: true
      changed_when: false
      register: dupes

    - name: Deduplicate values from /etc/login.defs
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        create: true
        regexp: (?i)^\s*CREATE_HOME\s+
        state: absent
