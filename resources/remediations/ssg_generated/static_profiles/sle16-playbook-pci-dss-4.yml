###############################################################################
#
# Ansible Playbook for PCI-DSS v4.0.1 Control Baseline for SUSE Linux Enterprise 16
#
# Profile Description:
# Payment Card Industry - Data Security Standard (PCI-DSS) is a set of
# security standards designed to ensure the secure handling of payment card
# data, with the goal of preventing data breaches and protecting sensitive
# financial information.
# This profile ensures SUSE Linux Enterprise 16 is configured in alignment
# with PCI-DSS v4.0.1 requirements.
#
# Profile ID:  xccdf_org.ssgproject.content_profile_pci-dss-4
# Benchmark ID:  xccdf_org.ssgproject.content_benchmark_SLE-16
# Benchmark Version:  0.1.80
# XCCDF Version:  1.2
#
# This file can be generated by OpenSCAP using:
# $ oscap xccdf generate fix --profile xccdf_org.ssgproject.content_profile_pci-dss-4 --fix-type ansible ssg-sle16-ds.xml
#
# This Ansible Playbook is generated from an XCCDF profile without preliminary evaluation.
# It attempts to fix every selected rule, even if the system is already compliant.
#
# How to apply this Ansible Playbook:
# $ ansible-playbook -i "localhost," -c local playbook.yml
# $ ansible-playbook -i "192.168.1.155," playbook.yml
# $ ansible-playbook -i inventory.ini playbook.yml
#
###############################################################################

- name: Ansible Playbook for xccdf_org.ssgproject.content_profile_pci-dss-4
