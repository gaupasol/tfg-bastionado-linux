    register: result_pam_password_auth_file_present
    when:
    - '"kernel-core" in ansible_facts.packages'
    - '"libpwquality" in ansible_facts.packages'
    tags:
    - CCE-85877-9
    - DISA-STIG-RHEL-08-020100
