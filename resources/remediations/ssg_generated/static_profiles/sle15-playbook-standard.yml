    - NIST-800-53-CM-6(a)
    - PCI-DSS-Req-10.4
    - PCI-DSSv4-10.6
    - PCI-DSSv4-10.6.1
    - enable_strategy
    - high_severity
    - low_complexity
    - low_disruption
    - no_reboot_needed
    - service_ntp_enabled
    - special_service_block
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
