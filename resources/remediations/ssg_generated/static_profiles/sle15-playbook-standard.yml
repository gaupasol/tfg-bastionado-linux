    - NIST-800-53-SI-2(5)
    - NIST-800-53-SI-2(c)
    - PCI-DSS-Req-6.2
    - PCI-DSSv4-6.3
    - PCI-DSSv4-6.3.3
    - high_disruption
    - low_complexity
    - medium_severity
    - patch_strategy
    - reboot_required
    - security_patches_up_to_date
    - skip_ansible_lint

  - name: Ensure rsyslog is installed
    ansible.builtin.package:
      name: rsyslog
      state: present
    when: ("kernel-default" in ansible_facts.packages or "kernel-default-base" in
      ansible_facts.packages)
    tags:
    - CCE-91161-0
    - NIST-800-53-CM-6(a)
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - package_rsyslog_installed

  - name: Ensure firewalld is installed
    ansible.builtin.package:
      name: firewalld
      state: present
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - var_network_filtering_service == "firewalld"
    tags:
    - CCE-85698-9
    - DISA-STIG-SLES-15-010220
    - NIST-800-53-AC-17(1)
    - NIST-800-53-CM-7
    - NIST-800-53-CM-7(b)
    - NIST-800-53-CM-7.1(iii)
    - PCI-DSSv4-1.2
    - PCI-DSSv4-1.2.1
    - enable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - package_firewalld_installed

  - name: Ensure cronie is installed
    ansible.builtin.package:
      name: cronie
      state: present
    when: ("kernel-default" in ansible_facts.packages or "kernel-default-base" in
      ansible_facts.packages)
