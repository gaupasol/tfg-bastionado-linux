  - name: Enable the OpenSSH Service - Enable service sshd
    block:

    - name: Enable the OpenSSH Service - Enable Service sshd
      ansible.builtin.systemd:
        name: sshd
        enabled: true
        state: started
        masked: false
      when:
      - '"openssh" in ansible_facts.packages'
    tags:
