    - NIST-800-53-CM-7(a)
    - NIST-800-53-CM-7(b)
    - disable_strategy
    - low_complexity
    - low_disruption
    - no_reboot_needed
    - package_httpd_removed
    - unknown_severity

  - name: Ensure ntp is installed
    ansible.builtin.package:
      name: ntp
      state: present
    when: ("kernel-default" in ansible_facts.packages or "kernel-default-base" in
