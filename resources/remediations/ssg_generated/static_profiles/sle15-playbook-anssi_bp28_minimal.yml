  - name: Gather the package facts
    ansible.builtin.package_facts:
      manager: auto
    tags:
    - always

  - name: Gather the service facts
    ansible.builtin.service_facts: null
    tags:
    - always

  - name: Ensure GPG check is globally activated
    community.general.ini_file:
      dest: /etc/zypp/zypp.conf
      section: main
      option: gpgcheck
      value: 1
      no_extra_spaces: true
      create: false
    when: '"zypper" in ansible_facts.packages'
    tags:
    - CCE-83290-7
    - CJIS-5.10.4.1
    - DISA-STIG-SLES-15-010430
    - NIST-800-171-3.4.8
    - NIST-800-53-CM-11(a)
    - NIST-800-53-CM-11(b)
    - NIST-800-53-CM-5(3)
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SA-12
    - NIST-800-53-SA-12(10)
    - NIST-800-53-SC-12
    - NIST-800-53-SC-12(3)
    - NIST-800-53-SI-7
    - PCI-DSS-Req-6.2
    - PCI-DSSv4-6.3
    - PCI-DSSv4-6.3.3
    - configure_strategy
    - ensure_gpgcheck_globally_activated
    - high_severity
    - low_complexity
    - medium_disruption
    - no_reboot_needed

  - name: Ensure GPG check Enabled for Local Packages (zypper)
    block:

    - name: Check stats of zypper
      ansible.builtin.stat:
        path: /etc/zypp/zypp.conf
      register: pkg

    - name: Check if config file of zypper is a symlink
      ansible.builtin.set_fact:
        pkg_config_file_symlink: '{{ pkg.stat.lnk_target if pkg.stat.lnk_target is
          match("^/.*") else "/etc/zypp/zypp.conf" | dirname ~ "/" ~ pkg.stat.lnk_target
          }}'
      when: pkg.stat.lnk_target is defined

    - name: Ensure GPG check Enabled for Local Packages (zypper)
      community.general.ini_file:
        dest: '{{ pkg_config_file_symlink |  default("/etc/zypp/zypp.conf") }}'
        section: main
        option: localpkg_gpgcheck
        value: 1
        no_extra_spaces: true
        create: true
    when: '"zypper" in ansible_facts.packages'
    tags:
    - CCE-91167-7
    - NIST-800-171-3.4.8
    - NIST-800-53-CM-11(a)
    - NIST-800-53-CM-11(b)
    - NIST-800-53-CM-5(3)
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SA-12
    - NIST-800-53-SA-12(10)
    - ensure_gpgcheck_local_packages
    - high_severity
    - low_complexity
    - medium_disruption
    - no_reboot_needed
    - unknown_strategy

  - name: Grep for zypper repo section names
    ansible.builtin.shell: |
      set -o pipefail
      grep -HEr '^\[.+\]' -r /etc/zypp/repos.d/
    register: repo_grep_results
    failed_when: repo_grep_results.rc not in [0, 1]
    changed_when: false
    tags:
    - CCE-85797-9
    - CJIS-5.10.4.1
    - NIST-800-171-3.4.8
    - NIST-800-53-CM-11(a)
    - NIST-800-53-CM-11(b)
    - NIST-800-53-CM-5(3)
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SA-12
    - NIST-800-53-SA-12(10)
    - NIST-800-53-SC-12
    - NIST-800-53-SC-12(3)
    - NIST-800-53-SI-7
    - PCI-DSS-Req-6.2
    - PCI-DSSv4-6.3
    - PCI-DSSv4-6.3.3
    - enable_strategy
    - ensure_gpgcheck_never_disabled
    - high_severity
    - low_complexity
    - medium_disruption
    - no_reboot_needed

  - name: Set gpgcheck=1 for each zypper repo
    community.general.ini_file:
      path: '{{ item[0] }}'
      section: '{{ item[1] }}'
      option: gpgcheck
      value: '1'
      no_extra_spaces: true
    loop: '{{ repo_grep_results.stdout |regex_findall( ''(.+\.repo):\[(.+)\]\n?''
      ) if repo_grep_results is not skipped else [] }}'
    when: repo_grep_results is not skipped
    tags:
    - CCE-85797-9
    - CJIS-5.10.4.1
    - NIST-800-171-3.4.8
    - NIST-800-53-CM-11(a)
    - NIST-800-53-CM-11(b)
    - NIST-800-53-CM-5(3)
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SA-12
    - NIST-800-53-SA-12(10)
    - NIST-800-53-SC-12
    - NIST-800-53-SC-12(3)
    - NIST-800-53-SI-7
    - PCI-DSS-Req-6.2
    - PCI-DSSv4-6.3
    - PCI-DSSv4-6.3.3
    - enable_strategy
    - ensure_gpgcheck_never_disabled
    - high_severity
    - low_complexity
    - medium_disruption
    - no_reboot_needed

  - name: Set control_flag fact
    ansible.builtin.set_fact:
      control_flag: requisite
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Check to see if 'pam_pwhistory.so' module is configured in '/etc/pam.d/common-password'
    ansible.builtin.shell: |
      set -o pipefail
      grep -E '^\s*password\s+\S+\s+pam_pwhistory.so' /etc/pam.d/common-password || true
    register: check_pam_module_result
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Configure 'pam_pwhistory.so' module in '/etc/pam.d/common-password'
    ansible.builtin.lineinfile:
      path: /etc/pam.d/common-password
      line: password requisite pam_pwhistory.so
      state: present
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    - check_pam_module_result.stdout is defined and '"pam_pwhistory.so" not in check_pam_module_result.stdout'
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Ensure 'pam_pwhistory.so' module has conforming control flag
    ansible.builtin.lineinfile:
      path: /etc/pam.d/common-password
      regexp: ^(\s*password\s+)\S+(\s+pam_pwhistory.so\s+.*)
      line: \g<1>requisite\g<2>
      backrefs: true
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    - control_flag|length
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Ensure "pam_pwhistory.so" module has argument "remember={{ var_password_pam_remember
      }}"
    ansible.builtin.lineinfile:
      path: /etc/pam.d/common-password
      regexp: ^(\s*password\s+requisite\s+pam_pwhistory.so(?:\s+\S+)*\s+remember=)(?:\S+)((\s+\S+)*\s*\\*\s*)$
      line: \g<1>{{ var_password_pam_remember }}\g<2>
      backrefs: true
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Check the presence of "remember" argument in "pam_pwhistory.so" module
    ansible.builtin.shell: |
      set -o pipefail
      grep -E '^\s*password\s+requisite\s+pam_pwhistory.so.*\s+remember(=|\s|\s*$)' /etc/pam.d/common-password || true
    register: check_pam_module_argument_result
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Add "remember" argument to "pam_pwhistory.so" module
    ansible.builtin.lineinfile:
      path: /etc/pam.d/common-password
      regexp: ^(\s*password\s+requisite\s+pam_pwhistory.so)((\s+\S+)*\s*(\\)*$)
      line: \g<1> remember={{ var_password_pam_remember }}\g<2>
      backrefs: true
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    - check_pam_module_argument_result is not skipped and '"remember" not in check_pam_module_argument_result.stdout'
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Set argument_value fact
    ansible.builtin.set_fact:
      argument_value: ''
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Ensure "pam_pwhistory.so" module has argument "use_authtok"
    ansible.builtin.lineinfile:
      path: /etc/pam.d/common-password
      regexp: ^(\s*password\s+requisite\s+pam_pwhistory.so(?:\s+\S+)*\s+use_authtok=)(?!)\S*((\s+\S+)*\s*\\*\s*)$
      line: \g<1>\g<2>
      backrefs: true
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    - argument_value|length
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Check the presence of "use_authtok" argument in "pam_pwhistory.so" module
    ansible.builtin.shell: |
      set -o pipefail
      grep -E '^\s*password\s+requisite\s+pam_pwhistory.so.*\s+use_authtok(=|\s|\s*$)' /etc/pam.d/common-password || true
    register: check_pam_module_argument_result
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Add "use_authtok" argument to "pam_pwhistory.so" module
    ansible.builtin.lineinfile:
      path: /etc/pam.d/common-password
      regexp: ^(\s*password\s+requisite\s+pam_pwhistory.so)((\s+\S+)*\s*(\\)*$)
      line: \g<1> use_authtok\g<2>
      backrefs: true
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - '"pam" in ansible_facts.packages'
    - check_pam_module_argument_result is not skipped and '"use_authtok" not in check_pam_module_argument_result.stdout'
    tags:
    - CCE-91398-8
    - accounts_password_pam_pwhistory_remember
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

  - name: Set Deny For Failed Password Attempts - Define a fact for control already
      filtered in case filters are used
    ansible.builtin.set_fact:
      pam_module_control: required
    when:
    - ("kernel-default" in ansible_facts.packages or "kernel-default-base" in ansible_facts.packages)
    - ( ansible_distribution == 'SLES' and ansible_distribution_version is version('15.7',
      '<') and "pam" in ansible_facts.packages )
    tags:
    - CCE-85554-4
