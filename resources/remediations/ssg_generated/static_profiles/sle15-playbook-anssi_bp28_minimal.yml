    - CJIS-5.10.4.1
    - DISA-STIG-SLES-15-010010
    - NIST-800-53-CM-6(a)
    - NIST-800-53-SI-2(5)
    - NIST-800-53-SI-2(c)
    - PCI-DSS-Req-6.2
    - PCI-DSSv4-6.3
    - PCI-DSSv4-6.3.3
    - high_disruption
    - low_complexity
    - medium_severity
    - patch_strategy
    - reboot_required
    - security_patches_up_to_date
    - skip_ansible_lint

  - name: 'Uninstall DHCP Server Package: Ensure dhcp-server is removed'
    ansible.builtin.package:
      name: dhcp-server
      state: absent
    tags:
