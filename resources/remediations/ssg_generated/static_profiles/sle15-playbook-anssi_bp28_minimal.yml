    - NIST-800-53-CM-6(a)
    - NIST-800-53-CM-7(a)
    - NIST-800-53-CM-7(b)
    - PCI-DSSv4-2.2
    - PCI-DSSv4-2.2.4
    - disable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - package_dhcp_removed

  - name: 'Uninstall Sendmail Package: Ensure sendmail is removed'
    ansible.builtin.package:
      name: sendmail
      state: absent
    when: ("kernel-default" in ansible_facts.packages or "kernel-default-base" in
      ansible_facts.packages)
    tags:
    - CCE-85761-5
    - NIST-800-53-CM-6(a)
    - NIST-800-53-CM-7(a)
    - NIST-800-53-CM-7(b)
    - disable_strategy
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - package_sendmail_removed

  - name: 'Uninstall xinetd Package: Ensure xinetd is removed'
    ansible.builtin.package:
      name: xinetd
      state: absent
    when: ("kernel-default" in ansible_facts.packages or "kernel-default-base" in
      ansible_facts.packages)
    tags:
