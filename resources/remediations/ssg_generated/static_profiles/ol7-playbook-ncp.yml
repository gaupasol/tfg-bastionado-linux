    var_login_console_enabled: 'true'
    var_mmap_low_allowed: 'false'
    var_mock_enable_homedirs: 'false'
    var_mount_anyfile: 'true'
    var_polyinstantiation_enabled: 'false'
    var_secadm_exec_content: 'true'
    var_secure_mode: 'false'
