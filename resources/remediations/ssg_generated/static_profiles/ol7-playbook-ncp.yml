    var_deny_ptrace: 'false'
    var_domain_fd_use: 'true'
    var_domain_kernel_load_modules: 'false'
    var_fips_mode: 'true'
    var_gpg_web_anon_write: 'false'
    var_guest_exec_content: 'true'
