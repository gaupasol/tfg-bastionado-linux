  - name: Setting unquoted shell-style assignment of 'Compress' to 'yes' in '/etc/systemd/journald.conf'
    block:

    - name: Check for duplicate values
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        create: true
        regexp: (?i)^\s*Compress=
        state: absent
      check_mode: true
      changed_when: false
      register: dupes

    - name: Deduplicate values from /etc/systemd/journald.conf
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        create: true
        regexp: (?i)^\s*Compress=
        state: absent
      when: dupes.found is defined and dupes.found > 1

    - name: Insert correct line to /etc/systemd/journald.conf
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        create: true
        regexp: (?i)^\s*Compress=
        line: Compress=yes
        state: present
        insertbefore: ^# Compress
        validate: /usr/bin/bash -n %s
    when: '"kernel" in ansible_facts.packages'
    tags:
    - journald_compress
    - low_complexity
    - low_disruption
    - medium_severity
    - no_reboot_needed
    - restrict_strategy

