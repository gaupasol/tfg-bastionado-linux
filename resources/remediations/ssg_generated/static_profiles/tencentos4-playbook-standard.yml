  - name: Ensure SELinux is Not Disabled - Check current SELinux state
    ansible.builtin.command:
      cmd: getenforce
    register: current_selinux_state
    check_mode: false
    changed_when: false
    when: '"kernel" in ansible_facts.packages'
    tags:
    - high_severity
    - low_complexity
    - low_disruption
