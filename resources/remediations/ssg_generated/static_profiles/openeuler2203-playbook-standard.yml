#
# Profile ID:  xccdf_org.ssgproject.content_profile_standard
# Benchmark ID:  xccdf_org.ssgproject.content_benchmark_OPENEULER2203
# Benchmark Version:  0.1.80
# XCCDF Version:  1.2
#
